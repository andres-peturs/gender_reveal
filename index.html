<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gáta</title>
    <style>
        :root {
            --cell: 44px;
            --font: 1.1rem;
        }
        @media (max-width: 480px) {
            :root { --cell: 36px; --font: 0.9rem; }
        }
        @media (max-width: 360px) {
            :root { --cell: 30px; --font: 0.78rem; }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111827;
            color: #e5e7eb;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 28px 16px 60px;
        }

        h1 {
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 5px;
            color: #6b7280;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        /* ── Intro overlay ───────────────────────────────── */
        .intro-overlay {
            display: flex;
            position: fixed; inset: 0;
            background: #0d1117;
            flex-direction: column;
            align-items: center; justify-content: flex-start;
            gap: 28px; z-index: 1000;
            padding: 48px 24px 40px;
            overflow-y: auto;
        }
        /* On taller screens, center vertically */
        @media (min-height: 640px) {
            .intro-overlay { justify-content: center; }
        }
        .intro-overlay.hidden { display: none; }

        .intro-title {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 900;
            color: #e5e7eb;
            letter-spacing: 3px;
            text-align: center;
        }

        .intro-subtitle {
            font-size: 0.95rem;
            color: #6b7280;
            text-align: center;
            max-width: 320px;
            line-height: 1.6;
        }

        .intro-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 340px;
        }

        .intro-label {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .intro-input {
            width: 100%;
            padding: 14px 16px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;
            color: #e5e7eb;
            font-size: 16px; /* must be ≥16px to prevent iOS auto-zoom on focus */
            outline: none;
            transition: border-color 0.2s;
        }
        .intro-input:focus { border-color: #3b82f6; }

        .intro-guess-label {
            font-size: 0.95rem;
            color: #d1d5db;
            font-weight: 600;
            text-align: center;
        }

        .guess-buttons {
            display: flex;
            gap: 16px;
        }

        .guess-btn {
            flex: 1;
            padding: 16px 12px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.1s, opacity 0.15s;
        }
        .guess-btn:active { transform: scale(0.96); }
        .guess-btn.strakur { background: #1d4ed8; color: white; }
        .guess-btn.strakur:hover { background: #1e40af; }
        .guess-btn.stelpa  { background: #be185d; color: white; }
        .guess-btn.stelpa:hover  { background: #9d174d; }

        .intro-error {
            font-size: 0.85rem;
            color: #f87171;
            text-align: center;
            min-height: 20px;
        }

        /* ── Layout ─────────────────────────────────────── */
        .game {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
        }

        @media (max-width: 700px) {
            .game { flex-direction: column; align-items: center; gap: 24px; }
            .hints { order: 2; width: 100%; max-width: 520px; }
            .crossword-col { order: 1; width: 100%; align-items: center; }
        }

        /* ── Hints panel ────────────────────────────────── */
        .hints { width: 260px; flex-shrink: 0; }

        .hint-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            user-select: none;
        }
        .hint-item:hover:not(.solved) { background: #1f2937; }
        .hint-item.active { background: #1e2d4a; border-color: #3b82f6; }
        .hint-item.solved { background: #0f2318; border-color: #166534; cursor: default; }

        .hint-num {
            background: #3b82f6;
            color: white;
            width: 26px; height: 26px; min-width: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .hint-item.active .hint-num { background: #2563eb; }
        .hint-item.solved .hint-num { background: #16a34a; }

        .hint-body { flex: 1; padding-top: 1px; min-width: 0; }
        .hint-text { font-size: 13px; line-height: 1.5; color: #d1d5db; }
        .hint-item.solved .hint-text { color: #86efac; }
        .hint-len  { font-size: 11px; color: #6b7280; margin-top: 2px; }

        .extra-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 8px;
            background: transparent;
            border: 1px solid #4b5563;
            border-radius: 4px;
            color: #6b7280;
            font-size: 11px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .extra-btn:hover { border-color: #9ca3af; color: #d1d5db; }

        .extra-reveal {
            display: none;
            font-size: 12px;
            color: #fbbf24;
            margin-top: 5px;
            font-style: italic;
        }
        .extra-reveal.show { display: block; }

        @media (max-width: 700px) {
            .hints { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .hint-item { margin-bottom: 0; }
        }
        @media (max-width: 380px) {
            .hints { grid-template-columns: 1fr; }
        }

        /* ── Crossword column ───────────────────────────── */
        .crossword-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        @media (max-width: 700px) {
            .crossword-col { order: 1; width: 100%; }
        }

        .grid-wrap { overflow-x: auto; width: 100%; }

        .grid { display: grid; gap: 2px; }

        /* ── Cells ──────────────────────────────────────── */
        .cell {
            width: var(--cell); height: var(--cell);
            display: flex; align-items: center; justify-content: center;
            font-size: var(--font); font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            transition: background 0.2s, border-color 0.2s, color 0.1s;
            position: relative;
        }

        .cell.blank   { background: transparent; }
        .cell.word    { background: #1f2937; border: 1px solid #374151; color: transparent; cursor: pointer; }
        .cell.nov     { background: #1e2d4a; border: 2px solid #3b82f6; color: transparent; cursor: pointer; }

        .cell.fixed   {
            background: #1f2937; border: 1px solid #374151;
            color: #6b7280; font-size: 0.85em;
            cursor: pointer;
        }

        .cell.word.ar { border-color: #4b6a9b; background: #1a253d; }
        .cell.nov.ar  { border-color: #60a5fa; background: #1a2d50; }
        .cell.fixed.ar{ border-color: #4b6a9b; background: #1a253d; color: #9ca3af; }

        .cell.typing      { color: #e5e7eb; }
        .cell.nov.typing  { color: #93c5fd; }

        .cell.cursor::after {
            content: '';
            position: absolute;
            left: 50%; top: 22%;
            transform: translateX(-50%);
            width: 2px; height: 56%;
            background: #60a5fa;
            border-radius: 1px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .cell.word-done  { background: #1f2937; border: 1px solid #374151; color: #9ca3af; cursor: default; }
        .cell.fixed-done { background: #1f2937; border: 1px solid #374151; color: #6b7280; font-size: 0.85em; cursor: default; }
        .cell.nov-done   {
            background: #14532d; border: 2px solid #22c55e; color: #86efac;
            animation: popIn 0.4s; cursor: default;
        }

        .cell.shake { animation: shk 0.35s; }
        @keyframes shk {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-6px)} 40%{transform:translateX(6px)}
            60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
        }

        @keyframes popIn {
            0%  {transform:scale(0.3);opacity:0}
            65% {transform:scale(1.25)}
            100%{transform:scale(1);opacity:1}
        }

        /* ── Progress bar ──────────────────────────────── */
        .progress-wrap {
            width: 100%;
            max-width: calc(var(--cell) * 14 + 2px * 13);
        }

        .progress-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .progress-label span {
            color: #60a5fa;
            font-weight: 700;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: #1f2937;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #22c55e);
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        /* ── Controls ───────────────────────────────────── */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .clue-bar {
            font-size: 13px;
            color: #93c5fd;
            text-align: center;
            padding: 0 6px;
            min-height: 18px;
        }

        .lock-btn {
            width: 100%; max-width: 280px;
            padding: 12px;
            background: #3b82f6;
            color: white; border: none;
            border-radius: 10px;
            font-size: 1rem; font-weight: 700;
            cursor: pointer; letter-spacing: 1px;
            transition: background 0.15s, transform 0.1s;
        }
        .lock-btn:hover  { background: #2563eb; }
        .lock-btn:active { transform: scale(0.97); background: #1d4ed8; }

        /* ── Off-screen keyboard capture (mobile) ───────── */
        #kbd {
            position: fixed;
            bottom: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0;
            font-size: 16px;
        }

        /* ── Victory overlay ────────────────────────────── */
        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.92);
            flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; z-index: 999; padding: 24px;
            text-align: center;
        }
        .overlay.show { display: flex; }

        .victory-name {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #9ca3af;
            letter-spacing: 1px;
        }

        .victory-guess {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 999px;
        }
        .victory-guess.correct { background: #14532d; color: #86efac; }
        .victory-guess.wrong   { background: #450a0a; color: #fca5a5; }

        .victory-main {
            font-size: clamp(1.6rem, 6vw, 3.2rem);
            font-weight: 900; color: #4ade80;
            text-shadow: 0 0 40px rgba(74,222,128,0.6);
            letter-spacing: 2px;
            animation: popIn 0.5s;
        }

        .reveal-img {
            max-width: min(85vw, 500px);
            max-height: 50vh;
            border-radius: 16px;
            border: 4px solid #4ade80;
            box-shadow: 0 0 60px rgba(74,222,128,0.3);
            opacity: 0;
            transition: opacity 0.8s 0.4s;
        }
        .reveal-img.visible { opacity: 1; }
    </style>
</head>
<body>

<!-- ── Intro screen ────────────────────────────────────────────── -->
<div class="intro-overlay" id="introOverlay">
    <div class="intro-title">Gettu þér til!</div>
    <div class="intro-subtitle">Leysið gátuna til að finna út hvort það verður strákur eða stelpa.</div>

    <div class="intro-form">
        <div>
            <div class="intro-label">Nafnið þitt:</div>
            <input class="intro-input" id="nameInput" type="text"
                   placeholder="Skrifaðu nafnið hér"
                   autocomplete="given-name" autocorrect="off"
                   autocapitalize="words" spellcheck="false"
                   inputmode="text" />
        </div>

        <div>
            <div class="intro-guess-label">Ég held að kynið sé:</div>
        </div>

        <div class="guess-buttons">
            <button class="guess-btn strakur" onclick="startGame('Strákur')">Strákur</button>
            <button class="guess-btn stelpa"  onclick="startGame('Stelpa')">Stelpa</button>
        </div>

        <div class="intro-error" id="introError"></div>
    </div>
</div>

<!-- ── Game ───────────────────────────────────────────────────── -->
<h1>Lestu gátuna</h1>

<div class="game">
    <div class="hints" id="hints"></div>

    <div class="crossword-col" id="crosswordCol">
        <div class="progress-wrap">
            <div class="progress-label"><span id="progressCount">0</span> / 8 leyst</div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div class="grid-wrap">
            <div class="grid" id="grid"></div>
        </div>
        <div class="controls">
            <div class="clue-bar" id="clueBar"></div>
            <button id="lockBtn" class="lock-btn">LOCK IN</button>
        </div>
    </div>
</div>

<input id="kbd" type="text"
       autocomplete="off" autocorrect="off"
       autocapitalize="characters" spellcheck="false" />

<!-- ── Victory overlay ────────────────────────────────────────── -->
<canvas id="confettiCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:1001;display:none;"></canvas>
<div class="overlay" id="overlay">
    <div class="victory-name" id="victoryName"></div>
    <div class="victory-guess" id="victoryGuess"></div>
    <div class="victory-main" id="victoryMain">Það er strákur á leiðinni!!</div>
    <img id="revealImg" class="reveal-img" src="696259145_1468921587780412_8027802381956702025_n.jpg" alt="" />
</div>

<script>
    // ── Config ────────────────────────────────────────────────────────────────
    // Replace with your actual Discord webhook URL to capture guesses
    const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1510009945528074342/_dglTkU23OnajJNsndUKdEuF-JbmYjJHo42Wcxy5OTKpPES88Xt5tNi8eq05bOY8La6_';

    // ── Puzzle data ───────────────────────────────────────────────────────────
    // KW_COL=4 (not 3) so words with the keyword letter at the end (e.g. PIZZA, key=4) fit
    const KW_COL    = 4;
    const TOTAL_COL = 14;
    const KEYWORD   = ['F','A','G','N','A','Ð','U','R'];

    // word : answer in uppercase; '&' = fixed visible separator user doesn't type
    // key  : 0-based index in `word` of the keyword letter
    // hint : clue text
    const PUZZLE = [
        { word: 'FISH',  key: 0, hint: 'Fiskur'                 },  // F
        { word: 'PIZZA', key: 4, hint: 'Uppáhalds matur Glódísar' },  // A
        { word: 'GOAT',  key: 0, hint: 'Geit'                   },  // G
        { word: 'NET',   key: 0, hint: 'Nét'                    },  // N
        { word: 'PIZZA', key: 4, hint: 'Uppáhalds matur Bylgju' },  // A
        { word: 'FAÐIR', key: 2, hint: 'Pabbi'                  },  // Ð
        { word: 'SUN',   key: 1, hint: 'Sól'                    },  // U
        { word: 'RAIN',  key: 0, hint: 'Rigning'                },  // R
    ];

    // ── Intro logic ───────────────────────────────────────────────────────────
    let playerName  = '';
    let playerGuess = '';

    function startGame(guess) {
        const nameEl  = document.getElementById('nameInput');
        const errorEl = document.getElementById('introError');
        const name    = nameEl.value.trim();

        if (!name) {
            errorEl.textContent = 'Vinsamlegast skrifaðu nafnið þitt.';
            nameEl.focus();
            return;
        }

        errorEl.textContent = '';
        playerName  = name;
        playerGuess = guess;

        recordGuess(name, guess);

        document.getElementById('introOverlay').classList.add('hidden');
        activate(0);
    }

    function discordPost(payload) {
        if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK === 'YOUR_DISCORD_WEBHOOK_URL_HERE') return;
        fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        }).catch(() => {});
    }

    function recordGuess(name, guess) {
        const color = guess === 'Strákur' ? 0x1d4ed8 : 0xbe185d;
        discordPost({ embeds: [{
            color,
            author: { name: '🎯 Ný giskun' },
            description: `**${name}** heldur að kynið sé **${guess}**`,
            timestamp: new Date().toISOString(),
        }]});
    }

    function recordSolve(name, guess) {
        const correct = guess === 'Strákur';
        discordPost({ embeds: [{
            color: 0x22c55e,
            author: { name: '✅ Leyst!' },
            description: `**${name}** leyst gátuna! Giskaði **${guess}** — ${correct ? 'rétt 🎉' : 'rangt 😅'}`,
            timestamp: new Date().toISOString(),
        }]});
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function typeLen(word) {
        return [...word].filter(c => c !== '&').length;
    }

    function lenLabel(word) {
        if (!word.includes('&')) return `${word.length} letters`;
        return word.split('&').map(p => p.length).join(' + ') + ' letters';
    }

    // ── Build grid ────────────────────────────────────────────────────────────
    const gridEl = document.getElementById('grid');
    gridEl.style.gridTemplateColumns = `repeat(${TOTAL_COL}, var(--cell))`;
    gridEl.style.gridTemplateRows    = `repeat(${PUZZLE.length}, var(--cell))`;

    const cellGrid = [];

    PUZZLE.forEach((entry, row) => {
        const { word, key } = entry;
        const startCol = KW_COL - key;
        const rowCells = [];

        for (let col = 0; col < TOTAL_COL; col++) {
            const div     = document.createElement('div');
            const charIdx = col - startCol;
            const inWord  = charIdx >= 0 && charIdx < word.length;

            if (!inWord) {
                div.className = 'cell blank';
            } else {
                const ch = word[charIdx];
                if (ch === '&') {
                    div.className = 'cell fixed';
                    div.textContent = '&';
                } else if (col === KW_COL) {
                    div.className = 'cell nov';
                } else {
                    div.className = 'cell word';
                }
                div.addEventListener('click', () => { if (!solved[row]) activate(row); });
            }

            gridEl.appendChild(div);
            rowCells.push(div);
        }

        cellGrid.push(rowCells);
    });

    // ── Build hints ───────────────────────────────────────────────────────────
    const hintsEl = document.getElementById('hints');

    PUZZLE.forEach((entry, i) => {
        const item = document.createElement('div');
        item.className = 'hint-item';
        item.id = `h${i}`;
        item.innerHTML = `
            <div class="hint-num">${i + 1}</div>
            <div class="hint-body">
                <div class="hint-text">${entry.hint}</div>
                <div class="hint-len">${lenLabel(entry.word)}</div>
            </div>`;
        if (entry.extraHint) {
            const btn = document.createElement('button');
            btn.className = 'extra-btn';
            btn.textContent = 'Extra hint?';
            const reveal = document.createElement('div');
            reveal.className = 'extra-reveal';
            reveal.textContent = entry.extraHint;
            btn.addEventListener('click', e => {
                e.stopPropagation();
                btn.style.display = 'none';
                reveal.classList.add('show');
            });
            item.querySelector('.hint-body').appendChild(btn);
            item.querySelector('.hint-body').appendChild(reveal);
        }

        item.addEventListener('click', () => { if (!solved[i]) activate(i); });
        hintsEl.appendChild(item);
    });

    // ── State ─────────────────────────────────────────────────────────────────
    const solved = new Array(PUZZLE.length).fill(false);
    let   active = 0;
    let   typed  = '';

    function redraw(row) {
        if (solved[row]) return;
        const { word, key } = PUZZLE[row];
        const startCol = KW_COL - key;
        let ti = 0;

        for (let i = 0; i < word.length; i++) {
            if (word[i] === '&') continue;
            const cell = cellGrid[row][startCol + i];
            cell.classList.remove('typing', 'cursor');
            cell.textContent = '';

            if (ti < typed.length) {
                cell.textContent = typed[ti];
                cell.classList.add('typing');
            } else if (ti === typed.length) {
                cell.classList.add('cursor');
            }
            ti++;
        }
    }

    function activate(row) {
        cellGrid.forEach((cells, r) => {
            if (solved[r]) return;
            const { word, key } = PUZZLE[r];
            const sc = KW_COL - key;
            for (let i = 0; i < word.length; i++) {
                const c = cells[sc + i];
                c.classList.remove('ar', 'typing', 'cursor');
                if (word[i] !== '&') c.textContent = '';
            }
        });
        document.querySelectorAll('.hint-item').forEach(h => h.classList.remove('active'));

        active = row;
        typed  = '';

        const { word, key } = PUZZLE[row];
        const sc = KW_COL - key;
        for (let i = 0; i < word.length; i++) {
            cellGrid[row][sc + i].classList.add('ar');
        }

        document.getElementById(`h${row}`).classList.add('active');
        document.getElementById('clueBar').textContent =
            `${row + 1}. ${PUZZLE[row].hint}  —  ${lenLabel(word)}`;

        redraw(row);
        setKbd('');
        kbd.focus();
    }

    // ── Input handling ────────────────────────────────────────────────────────
    const kbd      = document.getElementById('kbd');
    const overlay  = document.getElementById('overlay');
    const revealImg = document.getElementById('revealImg');

    function normalize(s) {
        return s.toUpperCase()
                .normalize('NFD')
                .replace(/[̀-ͯ]/g, '')
                .replace(/[^A-Z]/g, '');
    }

    function setKbd(val) {
        kbd.value = val;
        try { kbd.setSelectionRange(val.length, val.length); } catch (_) {}
    }

    document.addEventListener('keydown', e => {
        // Don't intercept when user is typing in any real input (e.g. name field)
        const ae = document.activeElement;
        if (ae && ae !== kbd && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) return;
        if (solved[active]) return;
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (e.key === 'Enter') { e.preventDefault(); submit(); return; }
        if (ae === kbd) return;

        if (e.key === 'Backspace') {
            e.preventDefault();
            typed = typed.slice(0, -1);
            setKbd(typed);
            redraw(active);
            return;
        }
        if (e.key.length === 1 && /\p{L}/u.test(e.key)) {
            e.preventDefault();
            if (typed.length < typeLen(PUZZLE[active].word)) {
                typed += e.key.toUpperCase();
                setKbd(typed);
                redraw(active);
            }
        }
    });

    kbd.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); submit(); }
    });

    kbd.addEventListener('input', () => {
        if (solved[active]) return;
        const max = typeLen(PUZZLE[active].word);
        const raw = kbd.value.toUpperCase().replace(/[^\p{L}]/gu, '').slice(0, max);
        typed = raw;
        setKbd(typed);
        redraw(active);
    });

    document.getElementById('crosswordCol').addEventListener('click', () => kbd.focus());

    document.getElementById('lockBtn').addEventListener('click', () => {
        kbd.focus();
        submit();
    });

    function submit() {
        if (solved[active] || !typed) return;
        const entry = PUZZLE[active];

        if (normalize(typed) !== normalize(entry.word)) {
            const sc = KW_COL - entry.key;
            for (let i = 0; i < entry.word.length; i++) {
                if (entry.word[i] === '&') continue;
                const c = cellGrid[active][sc + i];
                c.classList.remove('shake');
                void c.offsetWidth;
                c.classList.add('shake');
                setTimeout(() => c.classList.remove('shake'), 400);
            }
            typed = '';
            setKbd('');
            redraw(active);
            return;
        }

        const sc = KW_COL - entry.key;
        cellGrid[active].forEach((cell, col) => {
            const ci = col - sc;
            if (ci < 0 || ci >= entry.word.length) return;
            const ch = entry.word[ci];

            if (col === KW_COL) {
                cell.className = 'cell nov-done';
                cell.textContent = KEYWORD[active];
            } else if (ch === '&') {
                cell.className = 'cell fixed-done';
            } else {
                cell.className = 'cell word-done';
                cell.textContent = ch;
            }
        });

        solved[active] = true;
        document.getElementById(`h${active}`).classList.remove('active');
        document.getElementById(`h${active}`).classList.add('solved');
        updateProgress();

        if (solved.every(Boolean)) {
            setTimeout(showVictory, 500);
            return;
        }

        let next = -1;
        for (let i = active + 1; i < PUZZLE.length; i++) if (!solved[i]) { next = i; break; }
        if (next === -1) for (let i = 0; i < active; i++)  if (!solved[i]) { next = i; break; }
        if (next !== -1) activate(next);
    }

    function showVictory() {
        const nameEl  = document.getElementById('victoryName');
        const guessEl = document.getElementById('victoryGuess');
        const correct = playerGuess === 'Strákur';

        nameEl.textContent  = playerName ? `${playerName},` : '';
        guessEl.textContent = correct ? 'Rétt giskað!' : 'Rangt giskað';
        guessEl.className = `victory-guess ${correct ? 'correct' : 'wrong'}`;

        recordSolve(playerName, playerGuess);

        overlay.classList.add('show');
        setTimeout(() => revealImg.classList.add('visible'), 300);
        launchConfetti();
    }

    // ── Progress ──────────────────────────────────────────────────────────────
    function updateProgress() {
        const n = solved.filter(Boolean).length;
        document.getElementById('progressCount').textContent = n;
        document.getElementById('progressFill').style.width = `${(n / PUZZLE.length) * 100}%`;
    }

    // ── Blue confetti ─────────────────────────────────────────────────────────
    function launchConfetti() {
        const canvas = document.getElementById('confettiCanvas');
        canvas.style.display = 'block';
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');

        const COLORS = ['#3b82f6','#60a5fa','#93c5fd','#bfdbfe','#1d4ed8','#ffffff','#dbeafe'];
        const COUNT  = 160;

        const particles = Array.from({ length: COUNT }, () => ({
            x:    Math.random() * canvas.width,
            y:    -Math.random() * canvas.height,
            w:    6 + Math.random() * 8,
            h:    10 + Math.random() * 6,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            vx:   (Math.random() - 0.5) * 2.5,
            vy:   2.5 + Math.random() * 3,
            angle:  Math.random() * Math.PI * 2,
            spin:   (Math.random() - 0.5) * 0.18,
            opacity: 0.8 + Math.random() * 0.2,
        }));

        let frame;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = 0;
            for (const p of particles) {
                p.x     += p.vx;
                p.y     += p.vy;
                p.angle += p.spin;
                if (p.y < canvas.height + 20) active++;

                ctx.save();
                ctx.globalAlpha = p.opacity;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            }
            if (active > 0) {
                frame = requestAnimationFrame(draw);
            } else {
                canvas.style.display = 'none';
            }
        }
        draw();

        window.addEventListener('resize', () => {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }, { once: true });
    }
</script>
